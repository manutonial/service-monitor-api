services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - monitor-data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/monitor.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: on-failure:5

volumes:
  monitor-data: