name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: uv Tests
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest -q

  docker:
    name: Build and container smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t service-monitor-api:ci .

      - name: up container
        run: docker run -d --name service-monitor-api-ci -p 8000:8000 service-monitor-api:ci

      - name: Waiting the api 
        shell: bash
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/openapi.json > /dev/null; then
              echo "API respondeu com sucesso"
              exit 0
            fi
            echo "Wait until API is up..."
            sleep 2
          done

          echo "API timeout error"
          docker logs service-monitor-api-ci
          exit 1

      - name: Container logs if failed
        if: failure()
        run: docker logs service-monitor-api-ci

      - name: Remove container
        if: always()
        run: docker rm -f service-monitor-api-ci