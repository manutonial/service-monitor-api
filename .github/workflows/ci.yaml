name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests
        env:
          DATABASE_URL: "sqlite://"
        run: uv run pytest -v --tb=short

  docker:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    needs: test  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true   
          tags: service-monitor-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create data directory
        run: mkdir -p data

      - name: Start container
        run: |
          docker run -d \
            --name service-monitor-api-ci \
            -p 8000:8000 \
            -e DATABASE_URL=sqlite:// \
            service-monitor-api:ci

      - name: Wait for API to be ready
        shell: bash
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/openapi.json > /dev/null; then
              echo "API is up (attempt $i)"
              exit 0
            fi
            echo "Waiting for API... attempt $i/20"
            sleep 2
          done
          echo "Timed out after 40 s waiting for API"
          docker logs service-monitor-api-ci
          exit 1

      - name: Smoke test root endpoint
        run: |
          response=$(curl -fsS http://127.0.0.1:8000/)
          echo "Response: $response"
          echo "$response" | grep -q '"status"'

      - name: Print container logs on failure
        if: failure()
        run: docker logs service-monitor-api-ci

      - name: Remove container
        if: always()
        run: docker rm -f service-monitor-api-ci